version: 2
updates:
  - package-ecosystem: npm
    directory: "/services/dashboard-ui"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
  - package-ecosystem: gomod
    directory: "/services/collector-go"
    schedule:
      interval: weekly
  - package-ecosystem: cargo
    directory: "/services/sanitizer-rust"
    schedule:
      interval: weekly
  - package-ecosystem: pip
    directory: "/services/brain-python"
    schedule:
      interval: weekly
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
